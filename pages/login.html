<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login | NEXUS Marketplace</title>

<link rel="stylesheet" href="../assets/css/style.css">

<style>
.login-page{
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:#050816;
padding:20px;
}

.login-card{
width:100%;
max-width:450px;
padding:40px;
border-radius:20px;
background:rgba(255,255,255,.05);
}

.login-card h1{
text-align:center;
margin-bottom:20px;
}

.login-form{
display:flex;
flex-direction:column;
gap:15px;
}

.login-form input{
padding:15px;
border:none;
border-radius:10px;
}

.login-btn{
padding:15px;
border:none;
border-radius:10px;
cursor:pointer;
font-weight:bold;
}
</style>

</head>
<body>

<section class="login-page">

<div class="login-card">

<h1>Entrar</h1>

<form id="loginForm" class="login-form">

<input
type="email"
id="email"
placeholder="Email"
required
>

<input
type="password"
id="password"
placeholder="Palavra-passe"
required
>

<button
type="submit"
class="login-btn"
>
Entrar
</button>

</form>

<p style="text-align:center;margin-top:20px;">
<a href="registo.html">Criar Conta</a>
</p>

</div>

</section>

<script type="module">

import { loginUtilizador } from "../firebase/auth.js";

const form = document.getElementById("loginForm");

form.addEventListener("submit", async (e)=>{

e.preventDefault();

const email = document.getElementById("email").value;
const password = document.getElementById("password").value;

const user = await loginUtilizador(email,password);

if(user){

window.location.href="dashboard.html";

}

});

</script>

</body>
</html>
